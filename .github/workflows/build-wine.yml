name: Build Wine for Asahi Linux

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Wine
        run: |
          git clone https://gitlab.winehq.org/wine/wine.git
          cd wine
          git checkout wine-10.16

      - name: Install all build dependencies (single-line apt)
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            flex \
            bison \
            gettext \
            autoconf \
            pkg-config \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxi-dev \
            libxfixes-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libxdamage-dev \
            libxmu-dev \
            libxt-dev \
            libxaw7-dev \
            libfreetype-dev \
            libfontconfig-dev \
            libxft-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libosmesa6-dev \
            libasound2-dev \
            libpulse-dev \
            libjack-dev \
            libaudio-dev \
            libcups2-dev \
            libsane-dev \
            libusb-1.0-0-dev \
            libgnutls28-dev \
            libxml2-dev \
            libxslt1-dev \
            unixodbc-dev \
            zlib1g-dev \
            libbz2-dev \
            libv4l-dev \
            libgphoto2-dev \
            libncurses-dev \
            libssl-dev \
            libdbus-1-dev \
            libtiff-dev \
            libjpeg-dev \
            libpng-dev \
            libgif-dev \
            libmpg123-dev \
            libopenal-dev \
            libldap2-dev \
            libcapi20-dev \
            libsdl2-dev

      - name: Configure for 16K pages
        run: |
          cd wine
          mkdir -p build
          cd build
          ../configure --host=aarch64-linux-gnu \
                       CFLAGS="-DPAGE_SIZE=16384 -O2" \
                       CXXFLAGS="-DPAGE_SIZE=16384 -O2" \
                       --prefix=/usr/local

      - name: Build Wine
        run: |
          cd wine/build
          echo "Starting build (this will take 30-45 minutes)..."
          make -j$(nproc) 2>&1 | tee build.log

      - name: Create installation package
        run: |
          cd wine/build
          mkdir -p package/usr/local
          make install DESTDIR=$(pwd)/package
          cd package
          tar -czf ../../wine-asahi-16k.tar.gz .
          cp ../build.log ../../

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wine-asahi-16k-build
          path: |
            wine/wine-asahi-16k.tar.gz
            wine/build.log
          retention-days: 30
